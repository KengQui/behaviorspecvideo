<!DOCTYPE html>
<html><head><title>Audio Clips</title>
<style>
body { font-family: sans-serif; background: #1a1a2e; color: #eee; padding: 40px; }
h1 { margin-bottom: 30px; }
.clip { margin: 16px 0; padding: 16px; background: #16213e; border-radius: 8px; }
.clip label { font-size: 18px; font-weight: bold; display: block; margin-bottom: 8px; }
.clip span { font-size: 13px; color: #888; display: block; margin-bottom: 6px; }
audio { width: 100%; margin-top: 8px; }
</style></head><body>
<h1>Context Memory / Tone / Routing - Audio Clip</h1>
<div class="clip">
<label>Full clip (26s)</label>
<span>0s = Context/Memory | 12s = Tone | 18s = Routing | 26s = Scene end</span>
<audio controls src="clip-memory-tone-routing.wav"></audio>
</div>
</body></html>
